<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestor de Vehículos Familiar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #F5F0EB;
    --surface: #FEFCFA;
    --border: #E2D9CE;
    --text: #2C2416;
    --muted: #9E8E7A;
    --accent: #C4763A;
    --accent-light: #F5E4D0;
    --nat:    #A78BFA; --nat-bg:    #EDE9FE;
    --salva:  #6EE7B7; --salva-bg:  #D1FAE5;
    --lara:   #FCA5A5; --lara-bg:   #FFE4E6;
    --ananke: #93C5FD; --ananke-bg: #DBEAFE;
    --tobias: #FCD34D; --tobias-bg: #FEF9C3;
    --auto:      #C4763A;
    --camioneta: #4B7F9E;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID */
  .vehicle-grid {
    display: grid;
    grid-template-columns: 48px repeat(7, 1fr);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
    font-size: 11px;
    min-width: 480px;
  }
  .grid-header {
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    padding: 6px 3px;
    text-align: center;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    line-height: 1.3;
  }
  .time-label {
    background: var(--bg);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 3px 4px;
    text-align: right;
    color: var(--muted);
    font-size: 9px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    min-height: 32px;
  }
  .time-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    position: relative;
    min-height: 32px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .time-cell:last-child { border-right: none; }
  .time-cell.free { background: #F0FAF4; }
  .time-cell.free:hover, .time-cell.free:active { background: #DCFCE7; }
  .time-cell.occupied { background: var(--surface); }

  .reservation-block {
    position: absolute;
    inset: 1px;
    border-radius: 5px;
    padding: 2px 4px;
    font-size: 9px;
    font-weight: 600;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    border-left: 3px solid transparent;
    z-index: 2;
    transition: opacity 0.15s;
  }
  .reservation-block:active { opacity: 0.75; }
  .reservation-block .name { font-size: 9px; font-weight: 700; line-height: 1.2; }
  .reservation-block .reason { font-size: 8px; opacity: 0.75; line-height: 1.2; }

  .member-Nat    { background: var(--nat-bg);    border-left-color: var(--nat);    color: #5B21B6; }
  .member-Salva  { background: var(--salva-bg);  border-left-color: var(--salva);  color: #065F46; }
  .member-Lara   { background: var(--lara-bg);   border-left-color: var(--lara);   color: #9F1239; }
  .member-Ananke { background: var(--ananke-bg); border-left-color: var(--ananke); color: #1E40AF; }
  .member-Tobias { background: var(--tobias-bg); border-left-color: var(--tobias); color: #92400E; }

  .free-badge {
    position: absolute; inset: 1px; border-radius: 4px;
    background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(34,197,94,0.07) 4px, rgba(34,197,94,0.07) 8px);
    pointer-events: none;
  }

  /* Delete confirm overlay */
  .delete-overlay {
    position: absolute;
    inset: 1px;
    border-radius: 5px;
    background: rgba(239,68,68,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    z-index: 10;
    cursor: default;
  }
  .delete-overlay span { color: white; font-size: 8px; font-weight: 700; text-align: center; line-height: 1.2; }
  .delete-overlay-btns { display: flex; gap: 3px; margin-top: 2px; }
  .del-confirm-btn, .del-cancel-btn {
    padding: 2px 6px; border-radius: 4px; font-size: 8px;
    font-weight: 700; border: none; cursor: pointer;
  }
  .del-confirm-btn { background: white; color: #DC2626; }
  .del-cancel-btn  { background: rgba(255,255,255,0.25); color: white; }

  /* Form */
  .form-select, .form-input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--surface); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border-color 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  .form-select:focus, .form-input:focus { border-color: var(--accent); }

  .btn-primary {
    background: var(--accent); color: white; border: none;
    padding: 14px 24px; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px;
    cursor: pointer; transition: background 0.2s; width: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:active { background: #A85F28; }

  /* Bottom sheet (mobile form) */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 40;
    display: none;
    backdrop-filter: blur(2px);
  }
  .sheet-backdrop.open { display: block; }

  .bottom-sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    z-index: 50;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 92vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
  }
  .bottom-sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 12px auto 0;
  }

  /* Notifications */
  .notif {
    border-radius: 12px; padding: 13px 15px; font-size: 13px;
    line-height: 1.5; display: none; animation: slideIn 0.25s ease;
  }
  .notif.show { display: block; }
  .notif.success { background: #D1FAE5; border: 1px solid #6EE7B7; color: #065F46; }
  .notif.warning { background: #FEF9C3; border: 1px solid #FCD34D; color: #92400E; }
  .notif.error   { background: #FFE4E6; border: 1px solid #FCA5A5; color: #9F1239; }
  .notif.info    { background: var(--ananke-bg); border: 1px solid var(--ananke); color: #1E40AF; }
  @keyframes slideIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }

  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  /* Vehicle tabs */
  .vtab {
    padding: 8px 14px; border-radius: 8px; font-weight: 600;
    font-size: 13px; cursor: pointer; transition: all 0.15s; border: 2px solid transparent;
    white-space: nowrap;
  }
  .vtab.active-auto      { background: var(--accent-light); color: var(--accent);      border-color: var(--accent); }
  .vtab.active-camioneta { background: #DBEAFE;             color: var(--camioneta);   border-color: var(--camioneta); }
  .vtab.active-both      { background: #F3E8FF;             color: #7C3AED;             border-color: #A78BFA; }
  .vtab.inactive         { background: transparent; color: var(--muted); border-color: var(--border); }

  .scrollable-grid { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Sync */
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; transition: background 0.3s; flex-shrink: 0; }
  .sync-dot.online  { background: #22C55E; }
  .sync-dot.offline { background: #F87171; }
  .sync-dot.syncing { background: #FBBF24; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* Week nav */
  .week-btn {
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--text); padding: 7px 13px; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; white-space: nowrap;
  }
  .week-btn:active { border-color: var(--accent); color: var(--accent); }

  label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 5px; display: block;
  }

  /* FAB */
  .fab {
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom, 0px)); right: 20px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); color: white; border: none;
    font-size: 26px; cursor: pointer; z-index: 30;
    box-shadow: 0 4px 16px rgba(196,118,58,0.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .fab:active { transform: scale(0.93); box-shadow: 0 2px 8px rgba(196,118,58,0.3); }

  /* Desktop: hide FAB, show sidebar form */
  @media (min-width: 1024px) {
    .fab { display: none; }
    .sidebar-form { display: block !important; }
    .bottom-sheet, .sheet-backdrop { display: none !important; }
  }
  /* Mobile: hide sidebar form */
  @media (max-width: 1023px) {
    .sidebar-form { display: none !important; }
  }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }

  /* Reservation list item */
  .res-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 9px 10px; border-radius: 10px;
  }
</style>
</head>
<body>

<div class="max-w-7xl mx-auto p-3 md:p-5 space-y-4">

  <!-- HEADER -->
  <div class="flex items-start justify-between gap-3 flex-wrap">
    <div>
      <h1 style="font-family:'Fraunces',serif; font-weight:600; font-size:clamp(22px,5vw,36px); color:var(--text); line-height:1.1">
        Gestor de Vehículos
      </h1>
      <p class="text-xs mt-1" style="color:var(--muted)">Logística semanal · 2 vehículos · 5 integrantes</p>
    </div>
    <div class="flex flex-col items-end gap-2">
      <div class="flex items-center gap-2">
        <span class="sync-dot offline" id="syncDot"></span>
        <span id="syncLabel" class="text-xs" style="color:var(--muted)">Conectando...</span>
      </div>
      <div class="flex items-center gap-2">
        <button class="week-btn" onclick="changeWeek(-1)">←</button>
        <span id="weekLabel" class="text-xs font-semibold" style="color:var(--text); white-space:nowrap"></span>
        <button class="week-btn" onclick="changeWeek(1)">→</button>
      </div>
    </div>
  </div>

  <!-- LEGEND -->
  <div class="card p-3 flex flex-wrap gap-x-4 gap-y-2 items-center">
    <div class="flex flex-wrap gap-x-3 gap-y-1 items-center">
      <span class="text-xs font-bold uppercase tracking-wider" style="color:var(--muted)">Familia:</span>
      <span class="flex items-center gap-1 text-xs font-medium"><span class="dot" style="background:var(--nat)"></span>Nat</span>
      <span class="flex items-center gap-1 text-xs font-medium"><span class="dot" style="background:var(--salva)"></span>Salva</span>
      <span class="flex items-center gap-1 text-xs font-medium"><span class="dot" style="background:var(--lara)"></span>Lara</span>
      <span class="flex items-center gap-1 text-xs font-medium"><span class="dot" style="background:var(--ananke)"></span>Ananke</span>
      <span class="flex items-center gap-1 text-xs font-medium"><span class="dot" style="background:var(--tobias)"></span>Tobías</span>
    </div>
    <div class="flex gap-3 items-center">
      <span class="flex items-center gap-1 text-xs" style="color:#16A34A; font-weight:600">
        <span style="background:#F0FAF4; border:1px solid #86EFAC; width:12px; height:12px; border-radius:2px; display:inline-block;"></span>Libre
      </span>
      <span class="flex items-center gap-1 text-xs font-medium"><span class="dot" style="background:var(--auto); border-radius:2px"></span>Auto</span>
      <span class="flex items-center gap-1 text-xs font-medium"><span class="dot" style="background:var(--camioneta); border-radius:2px"></span>Camioneta</span>
    </div>
    <span class="text-xs" style="color:var(--muted)">💡 Tocá un bloque para eliminarlo</span>
  </div>

  <!-- MAIN -->
  <div class="flex flex-col lg:flex-row gap-4">

    <!-- CALENDAR -->
    <div class="flex-1 min-w-0 space-y-3">
      <!-- Tabs -->
      <div class="flex gap-2 overflow-x-auto pb-1">
        <button class="vtab active-auto" id="tab-auto" onclick="switchVehicle('auto')">🚗 Auto</button>
        <button class="vtab inactive"    id="tab-camioneta" onclick="switchVehicle('camioneta')">🚙 Camioneta</button>
        <button class="vtab inactive"    id="tab-both" onclick="switchVehicle('both')">Ver ambos</button>
      </div>
      <div id="gridContainer" class="space-y-4"></div>
    </div>

    <!-- SIDEBAR FORM (desktop only) -->
    <div class="sidebar-form lg:w-72 xl:w-80 space-y-4" style="display:none">
      <div class="card p-4 space-y-3">
        <h2 style="font-family:'Fraunces',serif; font-weight:600; font-size:17px">Nueva Reserva</h2>
        <div id="notifArea-desktop" class="notif"></div>
        <div><label>Integrante</label><select class="form-select" id="f-member-d" onchange="syncForm('d')"></select></div>
        <div><label>Vehículo</label><select class="form-select" id="f-vehicle-d" onchange="syncForm('d')"></select></div>
        <div><label>Día</label><select class="form-select" id="f-day-d" onchange="syncForm('d')"></select></div>
        <div class="grid grid-cols-2 gap-2">
          <div><label>Inicio</label><select class="form-select" id="f-start-d" onchange="syncForm('d')"></select></div>
          <div><label>Fin</label><select class="form-select" id="f-end-d" onchange="syncForm('d')"></select></div>
        </div>
        <div><label>Motivo</label><select class="form-select" id="f-reason-d" onchange="syncForm('d')"></select></div>
        <div><label>Nota</label><input type="text" class="form-input" id="f-note-d" placeholder="Opcional..." oninput="syncForm('d')"></div>
        <button class="btn-primary" onclick="submitReservation()">+ Agregar Reserva</button>
      </div>

      <div class="card p-4 space-y-2">
        <h2 style="font-family:'Fraunces',serif; font-weight:600; font-size:15px">Resumen semana</h2>
        <div id="statsArea" class="space-y-2"></div>
      </div>

      <div class="card p-4 space-y-2">
        <h2 style="font-family:'Fraunces',serif; font-weight:600; font-size:15px">Reservas activas</h2>
        <div id="reservationList" class="space-y-2 max-h-52 overflow-y-auto pr-1"></div>
      </div>
    </div>

  </div>

  <!-- MOBILE: stats + list below grid -->
  <div class="lg:hidden space-y-3">
    <div class="card p-4 space-y-2">
      <h2 style="font-family:'Fraunces',serif; font-weight:600; font-size:15px">Resumen semana</h2>
      <div id="statsArea-m" class="space-y-2"></div>
    </div>
    <div class="card p-4 space-y-2">
      <h2 style="font-family:'Fraunces',serif; font-weight:600; font-size:15px">Reservas activas</h2>
      <div id="reservationList-m" class="space-y-2 max-h-52 overflow-y-auto"></div>
    </div>
  </div>

</div>

<!-- FAB (mobile) -->
<button class="fab" onclick="openSheet()" aria-label="Nueva reserva">+</button>

<!-- BOTTOM SHEET (mobile) -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="p-4 space-y-3">
    <h2 style="font-family:'Fraunces',serif; font-weight:600; font-size:18px; padding-top:4px">Nueva Reserva</h2>
    <div id="notifArea-mobile" class="notif"></div>
    <div><label>Integrante</label><select class="form-select" id="f-member-m" onchange="syncForm('m')"></select></div>
    <div><label>Vehículo</label><select class="form-select" id="f-vehicle-m" onchange="syncForm('m')"></select></div>
    <div><label>Día</label><select class="form-select" id="f-day-m" onchange="syncForm('m')"></select></div>
    <div class="grid grid-cols-2 gap-3">
      <div><label>Inicio</label><select class="form-select" id="f-start-m" onchange="syncForm('m')"></select></div>
      <div><label>Fin</label><select class="form-select" id="f-end-m" onchange="syncForm('m')"></select></div>
    </div>
    <div><label>Motivo</label><select class="form-select" id="f-reason-m" onchange="syncForm('m')"></select></div>
    <div><label>Nota</label><input type="text" class="form-input" id="f-note-m" placeholder="Opcional..." oninput="syncForm('m')"></div>
    <button class="btn-primary" style="margin-bottom:8px" onclick="submitReservation()">+ Agregar Reserva</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── FIREBASE ─────────────────────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyC_zWUf8y7QW9h08YkKG5AQwOD9L6c7ZUk",
  authDomain: "autos-60a3c.firebaseapp.com",
  databaseURL: "https://autos-60a3c-default-rtdb.firebaseio.com",
  projectId: "autos-60a3c",
  storageBucket: "autos-60a3c.firebasestorage.app",
  messagingSenderId: "693169254560",
  appId: "1:693169254560:web:07a1536560d316e68099c5",
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const resRef = ref(db, 'reservations');

/* ── CONSTANTS ────────────────────────────────────────── */
const DAYS  = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const HOURS = Array.from({length:18}, (_,i) => i+6); // 6-23
const REASON_ICONS = {'Trabajo/Estudio':'💼','Trámites':'📋','Ocio':'🎉','SIC':'🏊','Emergencia':'🚨'};
const MC = {
  Nat:    {dot:'#A78BFA',bg:'#EDE9FE',text:'#5B21B6'},
  Salva:  {dot:'#6EE7B7',bg:'#D1FAE5',text:'#065F46'},
  Lara:   {dot:'#FCA5A5',bg:'#FFE4E6',text:'#9F1239'},
  Ananke: {dot:'#93C5FD',bg:'#DBEAFE',text:'#1E40AF'},
  Tobias: {dot:'#FCD34D',bg:'#FEF9C3',text:'#92400E'},
};

/* ── STATE ────────────────────────────────────────────── */
let reservations = {};
let weekOffset   = 0;
let activeView   = 'auto';

/* ── SYNC STATUS ──────────────────────────────────────── */
function setSyncStatus(state, label) {
  document.getElementById('syncDot').className   = `sync-dot ${state}`;
  document.getElementById('syncLabel').textContent = label;
}
setSyncStatus('syncing','Conectando...');

onValue(resRef, snap => {
  reservations = snap.val() || {};
  setSyncStatus('online','Sincronizado ✓');
  renderAll();
}, () => setSyncStatus('offline','Sin conexión'));

async function fbAdd(data)  { setSyncStatus('syncing','Guardando...'); await push(resRef, data); }
async function fbDel(id)    { setSyncStatus('syncing','Eliminando...'); await remove(ref(db,`reservations/${id}`)); }

/* ── PRIORITY ─────────────────────────────────────────── */
function prio(member, vehicle, reason) {
  if(member==='Nat' && vehicle==='auto' && reason==='Trabajo/Estudio') return 100;
  if(reason==='Trabajo/Estudio') return 50;
  if(reason==='Emergencia')      return 40;
  if(reason==='Trámites')        return 20;
  if(reason==='SIC')             return 15;
  if(reason==='Ocio')            return 10;
  return 5;
}

/* ── WEEK UTILS ───────────────────────────────────────── */
function getWeekStart(off=0) {
  const n=new Date(), day=n.getDay(), m=new Date(n);
  m.setDate(n.getDate()-(day===0?6:day-1)+off*7);
  m.setHours(0,0,0,0); return m;
}
function getDayDates(off=0) {
  const mon=getWeekStart(off);
  return DAYS.map((_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function dk(date) { return date.toISOString().split('T')[0]; }

window.changeWeek = dir => { weekOffset+=dir; populateDaySelects(); renderAll(); };

function updateWeekLabel() {
  const dd=getDayDates(weekOffset), fmt=d=>`${d.getDate()}/${d.getMonth()+1}`;
  document.getElementById('weekLabel').textContent=`${fmt(dd[0])} – ${fmt(dd[6])} · ${dd[0].getFullYear()}`;
}

/* ── FORM HELPERS ─────────────────────────────────────── */
function memberOpts() {
  return `<option value="">Seleccionar...</option>
    <option value="Nat">Nat</option><option value="Salva">Salva</option>
    <option value="Lara">Lara</option><option value="Ananke">Ananke</option>
    <option value="Tobias">Tobías</option>`;
}
function vehicleOpts() {
  return `<option value="">Seleccionar...</option>
    <option value="auto">🚗 Auto</option>
    <option value="camioneta">🚙 Camioneta</option>`;
}
function reasonOpts() {
  return `<option value="">Seleccionar...</option>
    <option value="Trabajo/Estudio">💼 Trabajo / Estudio</option>
    <option value="Trámites">📋 Trámites</option>
    <option value="Ocio">🎉 Ocio</option>
    <option value="SIC">🏊 SIC (Club)</option>
    <option value="Emergencia">🚨 Emergencia</option>`;
}
function timeOpts() {
  return HOURS.map(h=>`<option value="${h}">${String(h).padStart(2,'0')}:00</option>`).join('');
}

function populateDaySelects() {
  const dates=getDayDates(weekOffset);
  const opts='<option value="">Seleccionar...</option>'+dates.map((d,i)=>
    `<option value="${dk(d)}">${DAYS[i].slice(0,3)} ${d.getDate()}/${d.getMonth()+1}</option>`
  ).join('');
  ['m','d'].forEach(s => {
    const el=document.getElementById(`f-day-${s}`);
    if(el) el.innerHTML=opts;
  });
}

function initForms() {
  ['m','d'].forEach(s => {
    const byId = id => document.getElementById(`${id}-${s}`);
    byId('f-member').innerHTML  = memberOpts();
    byId('f-vehicle').innerHTML = vehicleOpts();
    byId('f-reason').innerHTML  = reasonOpts();
    byId('f-start').innerHTML   = timeOpts();
    byId('f-end').innerHTML     = timeOpts();
    byId('f-start').value = 8;
    byId('f-end').value   = 10;
  });
  populateDaySelects();
}

// Keep both forms in sync
let _syncing = false;
window.syncForm = function(source) {
  if(_syncing) return; _syncing=true;
  const other = source==='m'?'d':'m';
  ['member','vehicle','day','start','end','reason'].forEach(f=>{
    const src=document.getElementById(`f-${f}-${source}`);
    const dst=document.getElementById(`f-${f}-${other}`);
    if(src&&dst) dst.value=src.value;
  });
  const srcN=document.getElementById(`f-note-${source}`);
  const dstN=document.getElementById(`f-note-${other}`);
  if(srcN&&dstN) dstN.value=srcN.value;
  _syncing=false;
};

function getFormVal(field) {
  const m=document.getElementById(`f-${field}-m`);
  return m ? m.value : document.getElementById(`f-${field}-d`)?.value || '';
}
function setFormVal(field, val) {
  ['m','d'].forEach(s=>{
    const el=document.getElementById(`f-${field}-${s}`);
    if(el) el.value=val;
  });
}

/* ── SHEET (mobile) ───────────────────────────────────── */
window.openSheet = function(vehicle, dayKey, hour) {
  if(vehicle) setFormVal('vehicle', vehicle);
  if(dayKey)  setFormVal('day', dayKey);
  if(hour !== undefined) { setFormVal('start', hour); setFormVal('end', Math.min(hour+2,23)); }
  document.getElementById('sheetBackdrop').classList.add('open');
  document.getElementById('bottomSheet').classList.add('open');
  document.body.style.overflow='hidden';
};
window.closeSheet = function() {
  document.getElementById('sheetBackdrop').classList.remove('open');
  document.getElementById('bottomSheet').classList.remove('open');
  document.body.style.overflow='';
};

/* ── CONFLICTS ────────────────────────────────────────── */
function getConflicts(vehicle, dayKey, startH, endH, excludeId=null) {
  return Object.entries(reservations)
    .filter(([id,r]) => r.vehicle===vehicle && r.dayKey===dayKey &&
      id!==excludeId && r.startH<endH && r.endH>startH)
    .map(([id,r])=>({id,...r}));
}

/* ── SUBMIT ───────────────────────────────────────────── */
window.submitReservation = async function() {
  const member  = getFormVal('member');
  const vehicle = getFormVal('vehicle');
  const dayKey  = getFormVal('day');
  const startH  = parseInt(getFormVal('start'));
  const endH    = parseInt(getFormVal('end'));
  const reason  = getFormVal('reason');
  const note    = (document.getElementById('f-note-m')?.value || document.getElementById('f-note-d')?.value || '').trim();

  if(!member||!vehicle||!dayKey||!reason) { showNotif('Completá todos los campos obligatorios.','error'); return; }
  if(startH>=endH) { showNotif('La hora de fin debe ser mayor al inicio.','error'); return; }

  const newPrio   = prio(member,vehicle,reason);
  const conflicts = getConflicts(vehicle,dayKey,startH,endH);

  if(!conflicts.length) {
    await fbAdd({member,vehicle,dayKey,startH,endH,reason,note});
    showNotif(`✅ Reserva de <strong>${member}</strong> agregada — ${REASON_ICONS[reason]} ${reason}`,'success');
    closeSheet();
    return;
  }

  const lost = conflicts.filter(c=>prio(c.member,c.vehicle,c.reason)>=newPrio);
  if(lost.length) {
    const b=lost[0];
    showNotif(`⛔ <strong>${b.member}</strong> ya tiene el ${vehicle==='auto'?'Auto':'Camioneta'} de ${b.startH}:00–${b.endH}:00 con ${REASON_ICONS[b.reason]} ${b.reason} (igual o mayor prioridad).`,'error');
    return;
  }

  const other=vehicle==='auto'?'camioneta':'auto';
  const displaced=[];
  for(const c of conflicts) {
    await fbDel(c.id);
    const oc=getConflicts(other,c.dayKey,c.startH,c.endH);
    if(!oc.length) {
      await fbAdd({member:c.member,vehicle:other,dayKey:c.dayKey,startH:c.startH,endH:c.endH,reason:c.reason,note:c.note||''});
      displaced.push(`${c.member} → ${other==='auto'?'Auto':'Camioneta'}`);
    } else {
      displaced.push(`${c.member} eliminado (${other==='auto'?'Auto':'Camioneta'} también ocupada)`);
    }
  }
  await fbAdd({member,vehicle,dayKey,startH,endH,reason,note});
  showNotif(`⚡ <strong>${member}</strong> tiene mayor prioridad. Desplazó: ${displaced.join(', ')}`,'warning');
  closeSheet();
};

window.deleteReservation = async function(id) {
  await fbDel(id);
  showNotif('Reserva eliminada.','info');
};

/* ── RENDER ───────────────────────────────────────────── */
window.switchVehicle = function(v) {
  activeView=v;
  ['auto','camioneta','both'].forEach(x=>{
    const t=document.getElementById(`tab-${x}`);
    if(!t) return;
    t.className='vtab';
    if(x===v) t.classList.add(v==='auto'?'active-auto':v==='camioneta'?'active-camioneta':'active-both');
    else t.classList.add('inactive');
  });
  renderGrids();
};

function renderAll() {
  updateWeekLabel();
  renderGrids();
  renderStats();
  renderResList();
}

function resArr() { return Object.entries(reservations).map(([id,r])=>({id,...r})); }

function renderGrids() {
  const c=document.getElementById('gridContainer');
  c.innerHTML='';
  const vs=activeView==='both'?['auto','camioneta']:[activeView];
  vs.forEach(v=>c.appendChild(buildGrid(v)));
}

function buildGrid(vehicle) {
  const dates=getDayDates(weekOffset);
  const all=resArr();
  const vLabel=vehicle==='auto'?'🚗 Auto':'🚙 Camioneta';
  const vColor=vehicle==='auto'?'var(--auto)':'var(--camioneta)';
  const free=countFree(vehicle,dates,all);

  const wrap=document.createElement('div');
  wrap.className='space-y-2';

  // title row
  const title=document.createElement('div');
  title.className='flex items-center gap-2';
  title.innerHTML=`
    <span style="font-weight:700;font-size:13px;color:${vColor}">${vLabel}</span>
    <span style="background:#D1FAE5;color:#065F46;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px">${free} bloques libres</span>
  `;
  wrap.appendChild(title);

  const scroll=document.createElement('div');
  scroll.className='scrollable-grid';

  const grid=document.createElement('div');
  grid.className='vehicle-grid';

  // header
  const corner=document.createElement('div');
  corner.className='grid-header'; corner.textContent='Hora';
  grid.appendChild(corner);

  const today=new Date(); today.setHours(0,0,0,0);
  dates.forEach((d,i)=>{
    const h=document.createElement('div');
    h.className='grid-header';
    const isToday=d.getTime()===today.getTime();
    h.innerHTML=`<span style="color:${isToday?'#F97316':'inherit'}">${DAYS[i].slice(0,3)}<br><span style="font-weight:400;font-size:9px">${d.getDate()}/${d.getMonth()+1}</span></span>`;
    grid.appendChild(h);
  });

  // rows
  HOURS.forEach(hour=>{
    const tl=document.createElement('div');
    tl.className='time-label';
    tl.textContent=`${String(hour).padStart(2,'0')}:00`;
    grid.appendChild(tl);

    dates.forEach(d=>{
      const dayKey=dk(d);
      const cell=document.createElement('div');
      const slotRes=all.filter(r=>r.vehicle===vehicle&&r.dayKey===dayKey&&r.startH<=hour&&r.endH>hour);

      if(!slotRes.length) {
        cell.className='time-cell free';
        const badge=document.createElement('div');
        badge.className='free-badge';
        cell.appendChild(badge);
        // tap free cell → pre-fill form
        cell.onclick=()=>{
          // on mobile open sheet; on desktop just prefill
          if(window.innerWidth<1024) {
            openSheet(vehicle, dayKey, hour);
          } else {
            setFormVal('vehicle', vehicle);
            setFormVal('day', dayKey);
            setFormVal('start', hour);
            setFormVal('end', Math.min(hour+2,23));
            showNotif(`📅 Seleccionado: ${vLabel} — ${hour}:00 hs`,'info');
          }
        };
      } else {
        cell.className='time-cell occupied';
        const r=slotRes[0];
        if(r.startH===hour) {
          const span=r.endH-r.startH;
          const block=document.createElement('div');
          block.className=`reservation-block member-${r.member}`;
          block.style.height=`calc(${span*100}% + ${span-1}px)`;
          block.innerHTML=`<span class="name">${r.member==='Tobias'?'Tobías':r.member}</span><span class="reason">${REASON_ICONS[r.reason]||''} ${r.reason}</span>${r.note?`<span class="reason" style="opacity:0.5">${r.note}</span>`:''}`;

          // tap = show delete confirm overlay
          block.onclick=(e)=>{
            e.stopPropagation();
            showDeleteOverlay(block, r.id, span);
          };
          cell.appendChild(block);
        }
      }
      grid.appendChild(cell);
    });
  });

  scroll.appendChild(grid);
  wrap.appendChild(scroll);
  return wrap;
}

// Delete overlay on top of block
function showDeleteOverlay(block, id, span) {
  // Remove any existing overlays
  document.querySelectorAll('.delete-overlay').forEach(o=>o.remove());

  const ov=document.createElement('div');
  ov.className='delete-overlay';
  ov.style.height=`calc(${span*100}% + ${span-1}px)`;
  ov.innerHTML=`
    <span>¿Eliminar?</span>
    <div class="delete-overlay-btns">
      <button class="del-confirm-btn" id="del-yes-${id}">Sí</button>
      <button class="del-cancel-btn"  id="del-no-${id}">No</button>
    </div>
  `;
  block.parentElement.appendChild(ov);

  setTimeout(()=>{
    document.getElementById(`del-yes-${id}`)?.addEventListener('click', async (e)=>{
      e.stopPropagation();
      ov.remove();
      await window.deleteReservation(id);
    });
    document.getElementById(`del-no-${id}`)?.addEventListener('click', (e)=>{
      e.stopPropagation();
      ov.remove();
    });
  }, 50);

  // Auto-dismiss after 4s
  setTimeout(()=>ov.remove(), 4000);
}

function countFree(vehicle,dates,all) {
  let f=0;
  dates.forEach(d=>{ const key=dk(d); HOURS.forEach(h=>{ if(!all.some(r=>r.vehicle===vehicle&&r.dayKey===key&&r.startH<=h&&r.endH>h)) f++; }); });
  return f;
}

function renderStats() {
  const dates=getDayDates(weekOffset), keys=dates.map(dk);
  const wr=resArr().filter(r=>keys.includes(r.dayKey));
  const st={Nat:0,Salva:0,Lara:0,Ananke:0,Tobias:0};
  wr.forEach(r=>{ st[r.member]=(st[r.member]||0)+(r.endH-r.startH); });
  const html=Object.entries(st).sort((a,b)=>b[1]-a[1]).map(([m,h])=>`
    <div class="flex items-center gap-2">
      <span class="dot" style="background:${MC[m]?.dot}"></span>
      <span class="text-xs font-medium flex-1">${m==='Tobias'?'Tobías':m}</span>
      <span class="text-xs font-bold" style="color:${MC[m]?.text}">${h}h</span>
    </div>`).join('') || '<p class="text-xs" style="color:var(--muted)">Sin reservas.</p>';
  ['statsArea','statsArea-m'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=html; });
}

function renderResList() {
  const dates=getDayDates(weekOffset), keys=dates.map(dk);
  const wr=resArr().filter(r=>keys.includes(r.dayKey)).sort((a,b)=>a.dayKey.localeCompare(b.dayKey)||a.startH-b.startH);
  const html=wr.length ? wr.map(r=>{
    const mc=MC[r.member]||{};
    const di=keys.indexOf(r.dayKey);
    return `<div class="res-item" style="background:${mc.bg||'#f9f9f9'}">
      <span class="dot mt-0.5" style="background:${mc.dot};flex-shrink:0"></span>
      <div class="flex-1 min-w-0">
        <div class="text-xs font-bold" style="color:${mc.text}">${r.member==='Tobias'?'Tobías':r.member}</div>
        <div class="text-xs" style="color:var(--muted)">${di>=0?DAYS[di].slice(0,3):r.dayKey} · ${r.startH}:00–${r.endH}:00 · ${r.vehicle==='auto'?'🚗':'🚙'}</div>
        <div class="text-xs">${REASON_ICONS[r.reason]||''} ${r.reason}${r.note?` — ${r.note}`:''}</div>
      </div>
      <button onclick="window.deleteReservation('${r.id}')" style="color:#FCA5A5;background:none;border:none;cursor:pointer;font-size:18px;line-height:1;padding:0 2px;flex-shrink:0">×</button>
    </div>`;
  }).join('') : '<p class="text-xs" style="color:var(--muted)">Sin reservas esta semana.</p>';
  ['reservationList','reservationList-m'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=html; });
}

/* ── NOTIFICATIONS ────────────────────────────────────── */
function showNotif(msg, type) {
  ['notifArea-desktop','notifArea-mobile'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.innerHTML=msg; el.className=`notif ${type} show`;
    clearTimeout(el._t);
    el._t=setTimeout(()=>{ el.className='notif'; },7000);
  });
}

/* ── AUTO-SELECT VEHICLE FROM TAB ─────────────────────── */
// When user switches to a vehicle tab, pre-select that vehicle in the form
const origSwitch = window.switchVehicle;
window.switchVehicle = function(v) {
  origSwitch(v);
  if(v !== 'both') setFormVal('vehicle', v);
};

/* ── INIT ─────────────────────────────────────────────── */
initForms();
updateWeekLabel();
</script>
